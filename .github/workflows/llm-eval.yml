name: LLM Eval (tier 2)

# The full LLM evaluation harness — runs the REAL title classifier + extraction
# against the labelled gold set and reports precision/recall/F1, field accuracy,
# and faithfulness/hallucination. It needs the Ollama key and makes real LLM
# calls, so it runs on a schedule and on demand, NOT on every PR. The cheap,
# deterministic tier-1 checks (metric unit tests + gold-set schema validation)
# run in the normal `ci.yml` pytest job on every PR.

on:
  workflow_dispatch:        # run manually from the Actions tab
  schedule:
    - cron: "23 5 * * 1"    # weekly, Monday 05:23 UTC (off the :00 mark)

concurrency:
  group: llm-eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .[dev]

      - name: Run LLM eval harness
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: |
          if [ -z "$OLLAMA_API_KEY" ]; then
            echo "::warning::OLLAMA_API_KEY secret not set — skipping the LLM eval."
            exit 0
          fi
          python -m evals.run_eval --out evals/reports/ci.json

      - name: Publish eval summary
        if: always()
        run: |
          if [ -f evals/reports/ci.md ]; then
            cat evals/reports/ci.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-eval-report
          path: |
            evals/reports/ci.json
            evals/reports/ci.md
          if-no-files-found: ignore
