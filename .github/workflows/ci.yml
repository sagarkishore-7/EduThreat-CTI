name: CI

# Run on pushes to main and on every pull request. Branch pushes are covered by
# the pull_request event, so this avoids the double run that "push: [**]" caused.
on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # 3.11 is the declared floor (requires-python >=3.11); 3.13 is what the
        # production containers and local dev run, so both are exercised.
        python-version: ["3.11", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .[dev]

      - name: Compile Python sources
        run: python -m compileall -q src tests

      - name: Run test suite
        run: python -m pytest -m "not live_source" -ra
